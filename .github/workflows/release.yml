name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number. Use X.Y.Z for a real release (e.g. 0.21.0) or X.Y.Z-rc.N for a release candidate (e.g. 0.21.0-rc.1).'
        required: true
        type: string
      prerelease:
        description: 'Publish as a pre-release (not marked Latest; promote manually in the GitHub UI when ready). The auto-updater only serves the Latest release. Always forced on for -rc.N versions.'
        required: false
        default: true
        type: boolean

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "::error::Invalid version format '${{ inputs.version }}'. Expected X.Y.Z (e.g. 0.21.0) or X.Y.Z-rc.N (e.g. 0.21.0-rc.1)"
            exit 1
          fi

  typecheck:
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

  test:
    needs: validate-version
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1/4, 2/4, 3/4, 4/4]
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bunx playwright test --shard=${{ matrix.shard }}

  bump-and-tag:
    needs: [typecheck, test]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-rust

      - name: Bump version
        run: bun run scripts/bump-version.ts ${{ inputs.version }}

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/cli/Cargo.toml src-tauri/Cargo.lock
          if [[ "${{ inputs.version }}" == *-* ]]; then
            # Release candidate: tag a throwaway bump commit so the build is
            # versioned correctly, but do NOT advance master. This leaves the
            # final vX.Y.Z tag free and keeps master's version untouched until
            # the real release.
            git commit -m "chore: prerelease v${{ inputs.version }}"
            git tag -a "v${{ inputs.version }}" -m "Prerelease v${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          else
            # Final release: commit the bump to master and push it with the tag.
            git diff --cached --quiet || git commit -m "chore: bump version to ${{ inputs.version }}"
            git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
            git push origin HEAD:master --follow-tags
          fi

  changelog:
    needs: bump-and-tag
    runs-on: ubuntu-latest
    outputs:
      content: ${{ steps.release_notes.outputs.content }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}
          fetch-depth: 0

      - name: Generate release notes
        id: release_notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  build:
    needs: [bump-and-tag, changelog]
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: release-rust

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ inputs.version }}
          releaseName: 'Ultra GitLab v${{ inputs.version }}'
          releaseBody: ${{ needs.changelog.outputs.content }}
          releaseDraft: false
          # Always a pre-release for -rc.N versions; otherwise honor the input.
          prerelease: ${{ inputs.prerelease || contains(inputs.version, '-') }}
          args: --target aarch64-apple-darwin

      - name: Build ultra CLI binary
        working-directory: src-tauri
        run: cargo build --release -p ultra-gitlab-cli --target aarch64-apple-darwin

      - name: Package & attach ultra CLI to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tar -czf ultra-aarch64-apple-darwin.tar.gz \
            -C src-tauri/target/aarch64-apple-darwin/release ultra
          gh release upload "v${{ inputs.version }}" ultra-aarch64-apple-darwin.tar.gz --clobber
